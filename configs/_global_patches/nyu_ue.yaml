# @package _global_
# NYUDepthv2 UE task global patches (for future use)

dataset:
  task: ue

model:
  in_channels: 4
  num_classes: 40
  spatial_dims: 2
  channels: [64, 128, 256, 512]
  strides: [2, 2, 2]
  num_res_units: 2
  norm: "BATCH"
  act: "RELU"
  dropout: 0.0

training:
  data:
    transforms:
      normalize: false
      geom_aug: false
      intensity_aug: false
      image_size: [4, 480, 640]
      crop_size: null
      scale_range: [1.0, 1.0]
      mean: [0.485, 0.456, 0.406, 0.0]
      std:  [0.229, 0.224, 0.225, 1.0]

ue:
  algorithm:
    params:
      tied_channels: false
