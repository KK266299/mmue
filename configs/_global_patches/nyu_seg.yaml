# @package _global_
# NYUDepthv2 segmentation task global patches

dataset:
  task: seg

model:
  in_channels: 4            # RGB (3) + Depth (1)
  num_classes: 40            # NYU 40-class segmentation
  spatial_dims: 2
  channels: [64, 128, 256, 512]
  strides: [2, 2, 2]
  num_res_units: 2
  norm: "BATCH"
  act: "RELU"
  dropout: 0.0

training:
  data:
    transforms:
      normalize: true
      geom_aug: false
      intensity_aug: false
      image_size: [4, 480, 640]
      crop_size: [480, 640]
      scale_range: [0.5, 1.75]
      # RGB: ImageNet stats; Depth: no normalization (mean=0, std=1)
      mean: [0.485, 0.456, 0.406, 0.0]
      std:  [0.229, 0.224, 0.225, 1.0]

evaluation:
  num_classes: 40
  ignore_index: 255
  per_class: true
  class_names:
    - wall
    - floor
    - cabinet
    - bed
    - chair
    - sofa
    - table
    - door
    - window
    - bookshelf
    - picture
    - counter
    - blinds
    - desk
    - shelves
    - curtain
    - dresser
    - pillow
    - mirror
    - floor_mat
    - clothes
    - ceiling
    - books
    - fridge
    - tv
    - paper
    - towel
    - shower_curtain
    - box
    - whiteboard
    - person
    - night_stand
    - toilet
    - sink
    - lamp
    - bathtub
    - bag
    - otherstructure
    - otherfurniture
    - otherprop
